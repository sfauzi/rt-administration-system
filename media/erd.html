
<style>
#erd { padding: 0 0 8px; }
#erd svg { width: 100%; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    // darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});

const diagram = `erDiagram
  fee_types {
    uuid id PK
    string name
    string slug
    unsignedInt amount
    string billing_cycle
    text description
    boolean is_active
    timestamps created_at
  }

  houses {
    uuid id PK
    string house_number
    string address
    enum house_type
    enum occupancy_status
    text notes
    timestamps created_at
  }

  residents {
    uuid id PK
    string full_name
    string phone_number
    string id_card_photo
    enum resident_type
    boolean is_married
    date contract_start_date
    date contract_end_date
    boolean is_active
    text notes
    timestamps created_at
    softDeletes deleted_at
  }

  house_residents {
    uuid id PK
    uuid house_id FK
    uuid resident_id FK
    date move_in_date
    date move_out_date
    boolean is_current
    text notes
    timestamps created_at
  }

  payments {
    uuid id PK
    uuid house_id FK
    uuid resident_id FK
    uuid fee_type_id FK
    unsignedInt amount
    string billing_month
    string billing_year
    int months_covered
    enum status
    date paid_at
    string payment_method
    string receipt_number
    text notes
    timestamps created_at
  }

  expenses {
    uuid id PK
    string title
    string category
    unsignedInt amount
    date expense_date
    string expense_month
    text description
    string receipt_photo
    boolean is_recurring
    timestamps created_at
  }

  houses ||--o{ house_residents : "has occupant"
  residents ||--o{ house_residents : "lives in"
  houses ||--o{ payments : "billed to"
  residents ||--o{ payments : "paid by"
  fee_types ||--o{ payments : "applied in"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
